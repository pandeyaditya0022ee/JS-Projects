<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Guess the Number</title>
</head>
<body>
    <header>
        <h1>Project 3</h1>
    </header>
    <div class="container">
        <h1>Guess the Number</h1>
        <p>Guess a number between 1 and 100</p>
        <p id="instructions">You have 10 attempts to guess the correct number.</p>
        <form id="guess-form">
            <label for="guess-input">Your Guess:</label>
            <input type="number" id="guess-input" placeholder="Enter your guess" required>
            <input type="submit" id="submit-btn" class="submit-button" value="Submit Guess">
        </form>
        <div class="result">
            <p id="PreviousGuess">Previous Guess: <span class="guesses"></span> </p>
            <p id="Remaining">Remaining Attempts: <span class="lastResult">10</span></p>
            <p id="Message"></p>
        </div>
       
    </div>
        
    
</body>
<script src="script.js"></script>
</html>
